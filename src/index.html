<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sense UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Skip link for keyboard/screen-reader users -->
    <a href="#main" class="skip-link">Skip to main content</a>
    <header>
        <h1 class="sr-only">Sense UI</h1>
        <nav>
            <a href="index.html" aria-current="page">Chat</a>
            <br>
            <a href="settings.html">Settings</a>
            <br>
            <a href="about.html">About</a>
        </nav>
    </header>
    <main id="main">
        <section class="intro">
            <p>SenseUI provides real-time AI feedback to blind and low vision developers.</p>
            <p>SenseUI is still in beta and AI feedback might be inaccurate. Please report any issues.</p>
        </section>
        <section class="chat-container" aria-label="Chat interface">
            <div id="chat-messages" class="chat-messages" role="log"></div>
            <div class="buttons-container">
                <button type="button" id="describe-btn" class="btn-secondary">Describe webpage</button>
                <button type="button" id="issues-btn" class="btn-secondary">Find issues</button>
                <button type="button" id="download-chat" class="btn-secondary" aria-label="Download current chat">Download</button>
            </div>
            <div class="chat-input-area" id="chat-form">
                <label for="chat-input">Ask something about the page or use forward slash for commands</label>
                <input id="chat-input" class="chat-input" type="text" autocomplete="off"
                    aria-describedby="command-hint" />
                <span id="command-hint" class="sr-only">Type forward slash to see available commands</span>
                <datalist id="command-list">
                    <option value="/describe">
                    <option value="/issues">
                    <option value="/refresh">
                    <option value="/clear">
                </datalist>
                <button type="submit" class="chat-send btn-primary">Send</button>
            </div>
        </section>
    </main>
    <script src="script-bundled.js"></script>
</body>

</html>
